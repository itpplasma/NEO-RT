name: NEO-RT

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually, and lets an upstream libneo
  # release dispatch it against a candidate ref.
  workflow_dispatch:
    inputs:
      libneo_ref:
        description: libneo branch, tag or commit to build against
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        config: [Fast, Debug]

    steps:
    - uses: actions/checkout@v3

    - name: Install build dependencies
      run: |
        make deps

    - name: Install Python test dependencies
      run: |
        pip install pytest numpy h5py f90nml scipy

    - name: Build code
      run: |
        make CONFIG=${{ matrix.config }}${{ inputs.libneo_ref && format(' LIBNEO_REF={0}', inputs.libneo_ref) || '' }}

    - name: Run ctest
      run: |
        make ctest

    # The libneo gate dispatches this workflow (report-only) and wants only the
    # fast ctest tier; the golden-record pytest is the slow suite and stays on
    # NEO-RT's own push/PR runs.
    - name: Run pytest (all tests for Fast)
      if: github.event_name != 'workflow_dispatch' && matrix.config == 'Fast'
      run: |
        make pytest

    - name: Run pytest (skip golden record for Debug)
      if: github.event_name != 'workflow_dispatch' && matrix.config != 'Fast'
      run: |
        pytest -m "not fast_only"
